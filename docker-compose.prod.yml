name: luminous-prod

networks:
  luminous-net:
    name: luminous-net
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: luminousmysql
    volumes:
      - /home/project/data/mysql:/var/lib/mysql
    command: >
      --performance_schema=off
      --innodb_buffer_pool_size=32M
      --max_connections=50
      --table_definition_cache=200
      --table_open_cache=100
      --key_buffer_size=8M
      --default_authentication_plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pluminousmysql"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - luminous-net

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: luminousmongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - luminous-net

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - luminous-net

  app-backend:
    image: lbackend:latest
    container_name: app-backend
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - /home/project/images/.env.production
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - luminous-net

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/project/nginx/conf:/etc/nginx/conf.d
      - /home/project/nginx/html:/usr/share/nginx/html
      - /home/project/nginx/logs:/var/log/nginx
      - /etc/nginx/certs:/etc/nginx/certs
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - app-backend
    networks:
      - luminous-net
