name: luminous-dev

networks:
  luminous-net:
    name: luminous-net
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: luminousmysql
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --performance_schema=off
      --innodb_buffer_pool_size=32M
      --max_connections=50
      --table_definition_cache=200
      --table_open_cache=100
      --key_buffer_size=8M
      --default_authentication_plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pluminousmysql"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luminous-net

  mongodb:
    image: mongo:7.0
    container_name: mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: luminousmongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luminous-net

  redis:
    image: redis:7.2-alpine
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luminous-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend-dev
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - ./backend/.env.development
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - luminous-net

volumes:
  mysql_data:
