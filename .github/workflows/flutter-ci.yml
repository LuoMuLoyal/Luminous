name: luminous-ci

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: luminous-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true

      - name: Run repo-safe daily checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tool/run_daily_checks.ps1
