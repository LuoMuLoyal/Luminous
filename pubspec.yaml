name: luminous
description: "Health_Assistant_Flutter"
license: MIT
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 3.3.0+77

environment:
  sdk: ">=3.12.0 <4.0.0"

fluwx:
  ios:
    scene_delegate: true

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3
  hooks_riverpod: ^3.0.0
  go_router: ^17.2.3
  shared_preferences: ^2.5.4
  dio: ^5.9.2
  sqflite: ^2.4.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  permission_handler: ^12.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^10.3.1
  collection: ^1.19.1
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lucent_openapi:
    path: packages/lucent_openapi
  url_launcher: ^6.3.2
  fluwx: 5.7.5
  flutter_markdown_plus: ^1.0.7
  email_validator: ^2.1.17
  mobile_scanner: ^7.2.0
  google_mlkit_text_recognition: ^0.15.1
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.15.0
  json_serializable: ^6.9.5
  freezed: ^3.2.5
  melos: ^7.8.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/luminous_app_icon.png
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/luminous_app_icon.png
  adaptive_icon_foreground_inset: 24
  web:
    generate: true
    image_path: assets/icons/luminous_app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#159B55"
  windows:
    generate: true
    image_path: assets/icons/luminous_app_icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/icons/luminous_app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icons/luminous_app_icon.png

melos:
  useRootAsPackage: true
  scripts:
    pub-get:
      description: Install Flutter dependencies
      run: flutter pub get
    daily:
      description: Run local daily validation
      run: dart run tool/run_daily_checks.dart
    fullstack:
      description: Run the Android emulator full-stack validation gate
      run: dart run tool/run_fullstack_checks.dart
    fullstack-auth:
      description: Run the full-stack auth smoke lane
      run: flutter test integration_test/auth/fullstack_auth_smoke_test.dart -d emulator-5554 --dart-define-from-file=.env.fullstack-e2e
    fullstack-record:
      description: Run the full-stack record CRUD lane
      run: flutter test integration_test/record/fullstack_record_lane_test.dart -d emulator-5554 --dart-define-from-file=.env.fullstack-e2e
    fullstack-sleep:
      description: Run the full-stack sleep structured-entry lane
      run: flutter test integration_test/record/fullstack_sleep_lane_test.dart -d emulator-5554 --dart-define-from-file=.env.fullstack-e2e
    fullstack-today-report:
      description: Run the full-stack today/report AI lane
      run: flutter test integration_test/app/fullstack_today_report_lane_test.dart -d emulator-5554 --dart-define-from-file=.env.fullstack-e2e
